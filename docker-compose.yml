# Local infra for the slice: Postgres (with pgvector) + Redis.
# Start with: docker compose up -d
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: albert
      POSTGRES_PASSWORD: albert
      POSTGRES_DB: albert
    ports:
      - "5432:5432"
    volumes:
      - albert_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U albert"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  albert_pg:
